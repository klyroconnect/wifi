<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Klyro Enterprises | Mfumo Rahisi</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    :root {
      --blue: #1a6ef5;
      --blue-hover: #0f55d4;
      --blue-glow: rgba(26,110,245,0.2);
      --bg1: rgba(10, 13, 20, 0.82);
      --bg2: rgba(14, 18, 28, 0.88);
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.15);
      --border3: rgba(26,110,245,0.4);
      --text: #f0f4ff;
      --muted: #8a95b0;
      --hint: #4e5670;
      --green: #22c55e;
      --wa: #25d366;
      --r-sm: 8px;
      --r-md: 14px;
      --r-lg: 20px;
      --r-xl: 26px;
      --r-pill: 100px;
      --font-head: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    body {
      font-family: var(--font-body);
      color: var(--text);
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: url('klyroback.jpg') center center / cover no-repeat;
      z-index: -2;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(5, 7, 14, 0.70);
      z-index: -1;
    }

    .app {
      width: 100%;
      height: 100vh;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      padding: 16px;
      position: relative;
      z-index: 1;
    }

    /* Paneli za kando – zina namba moja tu */
    .side-number {
      background: var(--bg1);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-head);
      font-size: 4rem;
      font-weight: 800;
      color: rgba(26,110,245,0.4);
      text-shadow: 0 0 8px rgba(26,110,245,0.2);
      transition: all 0.2s;
      min-width: 70px;
      width: auto;
      padding: 12px;
    }

    /* Sehemu ya katikati */
    .center-col {
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-width: 0; /* kuzuia overflow */
    }

    .header-strip {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--bg1);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 10px 18px;
      backdrop-filter: blur(16px);
      flex-shrink: 0;
    }

    .logo-box {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, #1a6ef5, #0a3fa8);
      border: 1px solid rgba(26,110,245,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }

    .logo-box img {
      width: 27px;
      height: 27px;
      object-fit: contain;
    }

    .logo-fallback {
      font-family: var(--font-head);
      font-size: 18px;
      font-weight: 700;
      color: #fff;
    }

    .header-text h1 {
      font-family: var(--font-head);
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .header-text p {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 2px;
    }

    /* CARD kuu */
    .main-card {
      flex: 1;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: var(--r-xl);
      padding: 20px 22px 16px;
      backdrop-filter: blur(18px);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    /* LOGIN VIEW */
    #loginView {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .field-label {
      font-size: 0.67rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.9px;
      color: var(--muted);
      margin-bottom: 7px;
    }

    .input-row {
      position: relative;
      margin-bottom: 11px;
    }

    .input-row input {
      width: 100%;
      background: rgba(0,0,0,0.35);
      border: 1px solid var(--border2);
      border-radius: var(--r-pill);
      padding: 10px 44px 10px 16px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.92rem;
      outline: none;
    }

    .input-row input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px var(--blue-glow);
    }

    .eye-btn {
      position: absolute;
      right: 13px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--hint);
      cursor: pointer;
    }

    .btn-login {
      width: 100%;
      padding: 11px;
      background: var(--blue);
      border: none;
      border-radius: var(--r-pill);
      color: #fff;
      font-family: var(--font-head);
      font-size: 0.88rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      transition: background 0.2s;
      box-shadow: 0 4px 16px rgba(26,110,245,0.3);
    }

    .btn-login:hover { background: var(--blue-hover); }

    .error-box {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: var(--r-md);
      padding: 7px 12px;
      font-size: 0.74rem;
      color: #fca5a5;
      margin-top: 9px;
      display: none;
      align-items: center;
      gap: 7px;
    }

    /* MAWASILIANO */
    .contact-section {
      margin-top: auto;
      padding-top: 11px;
      border-top: 1px solid var(--border);
    }

    .contact-heading {
      font-size: 0.67rem;
      color: var(--hint);
      text-align: center;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 6px;
    }

    .contact-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 7px 8px;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border2);
      border-radius: var(--r-pill);
      font-size: 0.73rem;
      color: var(--muted);
      text-decoration: none;
      transition: 0.1s;
      white-space: nowrap;
    }

    .contact-btn.phone { color: #60a5fa; }
    .contact-btn.wa { color: var(--wa); }
    .contact-btn.gmail { color: #f87171; }

    /* DASHBOARD */
    #dashView {
      display: none;
      flex-direction: column;
      height: 100%;
      gap: 12px;
    }

    .dash-topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .badge-ok {
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.25);
      border-radius: var(--r-pill);
      padding: 5px 13px;
      font-size: 0.72rem;
      color: #86efac;
    }

    .btn-logout {
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border2);
      border-radius: var(--r-pill);
      padding: 6px 13px;
      font-size: 0.76rem;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .pw-card {
      flex: 1;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border3);
      border-radius: var(--r-lg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 16px;
    }

    .pw-chip {
      background: rgba(26,110,245,0.15);
      border: 1px solid var(--border3);
      border-radius: var(--r-pill);
      padding: 3px 12px;
      font-size: 0.64rem;
      text-transform: uppercase;
      color: #93c5fd;
      margin-bottom: 12px;
    }

    .pw-value {
      font-family: monospace;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 3px;
      word-break: break-all;
      margin-bottom: 14px;
    }

    .btn-copy {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border2);
      border-radius: var(--r-pill);
      padding: 7px 18px;
      font-size: 0.8rem;
      color: var(--muted);
      cursor: pointer;
    }

    .copy-ok {
      font-size: 0.73rem;
      color: var(--green);
      margin-top: 8px;
      min-height: 20px;
    }

    .info-notice {
      background: rgba(26,110,245,0.07);
      border: 1px solid var(--border3);
      border-radius: var(--r-md);
      padding: 8px 13px;
      font-size: 0.74rem;
      color: #93c5fd;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .footer-strip {
      background: var(--bg1);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 6px 16px;
      text-align: center;
      font-size: 0.66rem;
      color: var(--hint);
      flex-shrink: 0;
    }

    /* Hakuna scrollbars */
    ::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }

    @media (max-width: 640px) {
      .app {
        gap: 8px;
        padding: 10px;
      }
      .side-number {
        font-size: 2.5rem;
        min-width: 50px;
        padding: 8px;
      }
      .pw-value {
        font-size: 1.4rem;
        letter-spacing: 2px;
      }
      .contact-btn {
        white-space: normal;
        font-size: 0.65rem;
        padding: 6px 5px;
      }
      .main-card {
        padding: 15px;
      }
    }
  </style>
</head>
<body>

<div class="app">
  <!-- PANEL KUSHOTO: NAMBA 1 -->
  <div class="side-number">1</div>

  <!-- SEHEMU YA KATI -->
  <div class="center-col">
    <div class="header-strip">
      <div class="logo-box">
        <img src="logo.png" alt="Klyro" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
        <span class="logo-fallback" style="display:none;">K</span>
      </div>
      <div class="header-text">
        <h1>Klyro Enterprises</h1>
        <p>Mfumo wa kijamii na huduma</p>
      </div>
    </div>

    <div class="main-card">
      <!-- LOGIN -->
      <div id="loginView">
        <label class="field-label"><i class="fas fa-key" style="margin-right:5px;"></i>Nenosiri la mfumo</label>
        <div class="input-row">
          <input type="password" id="pwInput" placeholder="Ingiza nenosiri...">
          <button type="button" class="eye-btn" onclick="toggleEye()"><i class="far fa-eye-slash" id="eyeIcon"></i></button>
        </div>
        <button class="btn-login" onclick="doLogin()"><i class="fas fa-arrow-right-to-bracket"></i> Fungua Mfumo</button>
        <div class="error-box" id="errBox"><i class="fas fa-circle-exclamation"></i><span id="errMsg"></span></div>

        <div class="contact-section">
          <div class="contact-heading"><i class="fas fa-headset"></i> Kwa msaada wa haraka</div>
          <div class="contact-grid">
            <a class="contact-btn phone" href="tel:+255763915562"><i class="fas fa-phone-alt"></i> +255 763 915 562</a>
            <a class="contact-btn phone" href="tel:+255663445562"><i class="fas fa-phone-alt"></i> +255 663 445 562</a>
          </div>
          <div class="contact-grid">
            <a class="contact-btn wa" href="https://wa.me/255763915562?text=Karibu%20Klyro%20Services%2C%20ninahitaji%20msaada." target="_blank"><i class="fab fa-whatsapp"></i> WhatsApp</a>
            <a class="contact-btn gmail" href="https://mail.google.com/mail/?view=cm&to=klyro.connect@gmail.com&su=Klyro%20Support&body=Habari%2C%0A%0ANinahitaji%20msaada%20wa%20huduma." target="_blank"><i class="fab fa-google"></i> Gmail</a>
          </div>
        </div>
      </div>

      <!-- DASHBOARD -->
      <div id="dashView">
        <div class="dash-topbar">
          <div class="badge-ok"><i class="fas fa-shield-check"></i> Umeingia kwa usalama</div>
          <button class="btn-logout" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i> Toka</button>
        </div>
        <div class="pw-card">
          <div class="pw-chip"><i class="fas fa-fingerprint"></i> Nenosiri la leo (wife password)</div>
          <div class="pw-value" id="pwDisplay">––––</div>
          <button class="btn-copy" onclick="copyPw()"><i class="fas fa-copy"></i> Nakili nenosiri</button>
          <div class="copy-ok" id="copyOk"></div>
        </div>
        <div class="info-notice">
          <i class="fas fa-circle-info"></i> Nenosiri hili hubadilishwa kwenye GitHub kila siku.
        </div>
      </div>
    </div>

    <div class="footer-strip">
      &copy; 2025 Klyro Enterprises &middot; Tanzania
    </div>
  </div>

  <!-- PANEL KULIA: NAMBA 2 -->
  <div class="side-number">2</div>
</div>

<script>
  // ========== CONFIGURATION ==========
  const LOGIN_PASSWORD = "klyro";
  let WIFE_PASSWORD = "4521oOpk2";   // Badilisha hapa kila siku
  const SESSION_KEY = "klyro_auth";

  const loginView = document.getElementById("loginView");
  const dashView = document.getElementById("dashView");
  const pwInput = document.getElementById("pwInput");
  const eyeIcon = document.getElementById("eyeIcon");
  const errBox = document.getElementById("errBox");
  const errMsg = document.getElementById("errMsg");
  const pwDisplay = document.getElementById("pwDisplay");
  const copyOk = document.getElementById("copyOk");

  function toggleEye() {
    if (pwInput.type === "password") {
      pwInput.type = "text";
      eyeIcon.className = "far fa-eye";
    } else {
      pwInput.type = "password";
      eyeIcon.className = "far fa-eye-slash";
    }
  }

  function showDash() {
    loginView.style.display = "none";
    dashView.style.display = "flex";
    pwDisplay.textContent = WIFE_PASSWORD;
    copyOk.textContent = "";
  }

  function showLogin(clear = true) {
    dashView.style.display = "none";
    loginView.style.display = "flex";
    if (clear) {
      pwInput.value = "";
      pwInput.type = "password";
      eyeIcon.className = "far fa-eye-slash";
    }
    errBox.style.display = "none";
  }

  function doLogin() {
    const val = pwInput.value.trim();
    if (!val) {
      errMsg.textContent = "Tafadhali ingiza nenosiri.";
      errBox.style.display = "flex";
      return;
    }
    if (val === LOGIN_PASSWORD) {
      sessionStorage.setItem(SESSION_KEY, "true");
      showDash();
    } else {
      errMsg.textContent = "Nenosiri si sahihi. Jaribu 'klyro'.";
      errBox.style.display = "flex";
      pwInput.value = "";
      pwInput.focus();
    }
  }

  function doLogout() {
    sessionStorage.removeItem(SESSION_KEY);
    showLogin(true);
  }

  async function copyPw() {
    try {
      await navigator.clipboard.writeText(WIFE_PASSWORD);
      copyOk.innerHTML = '<i class="fas fa-check-circle"></i> Ime nakiliwa!';
      setTimeout(() => { copyOk.textContent = ""; }, 2000);
    } catch(e) {
      copyOk.textContent = "Nakili manually: " + WIFE_PASSWORD;
    }
  }

  pwInput.addEventListener("keypress", (e) => { if (e.key === "Enter") doLogin(); });
  pwInput.addEventListener("input", () => { errBox.style.display = "none"; });

  // Angalia session
  if (sessionStorage.getItem(SESSION_KEY) === "true") {
    showDash();
  } else {
    showLogin(false);
  }

  // Ikiwa ukurasa unarudi kutoka cache
  window.addEventListener("pageshow", () => {
    if (sessionStorage.getItem(SESSION_KEY) === "true" && loginView.style.display !== "none") {
      showDash();
    }
  });
</script>
</body>
</html>
